// ZThemeKSP2Layout - tune the KSP2-style UI here. No recompile needed: edit a value,
// press Ctrl+Alt+F6 in-game, see the change instantly. Set enabled = false (or delete
// Plugins\ZThemeKSP2Layout.dll) to disable everything; nothing is persisted to KSP's
// settings.cfg, so disabling gives a full revert.

ZThemeKSP2Layout
{
	enabled = true

	// ---------- FLIGHT: movers ----------

	// Navball horizontal position. -1 = far left, 0 = center, +1 = far right.
	moveNavball = true
	navballPosX = -0.8

	// SAS mode wheel positioned RIGHT of the navball.
	moveSASModes = true
	sasModesOffset = 530,20

	// Mode panel (staging/docking/map/maneuver switcher) shifted LEFT of the navball,
	// toward the right-edge mode buttons. Negative x = leftward.
	moveModeFrame = true
	modeFrameOffset = -340,0

	// Docking control quadrant: the CTRL MODE ROT/LIN input display (linear translation
	// LEFT/RIGHT/UP/DOWN + rotation gauges) that stock puts bottom-center. Moved into the
	// gap right of the navball. Negative x = leftward, positive y = up. Canvas px.
	// Only visible while in docking control mode. Live-tunable with Ctrl+Alt+F6.
	moveDockQuadrant = true
	dockQuadrantOffset = -470,0

	// Maneuver-mode panel (node editor + dV handle editor). Same gap as the docking
	// quadrant. Only visible in maneuver mode with a node. Live-tunable with Ctrl+Alt+F6.
	moveManQuadrant = true
	manQuadrantOffset = -470,0

	// Staging stack position. pinStagingLeft glues it to the LEFT screen edge (mirror of
	// the toolbar pin) and OVERRIDES stagingToToolbar when true. stagingToToolbar pins it
	// flush-left of the app/MechJeb toolbar on the right. stagingOffset is the fallback if
	// both pins are off. stagingLeftGap = px inset from the left edge in left mode.
	// pinStagingLeft is live-toggleable with Ctrl+Alt+F6 once the new DLL is loaded.
	moveStaging = true
	pinStagingLeft = true
	stagingLeftGap = 8
	stagingToToolbar = true
	stagingOffset = 0.90,-0.04

	// MET clock + warp arrows to the bottom-center (KSP2 app-bar spot).
	moveMET = true
	metOffset = 0.42,-0.90

	// Kerbal portraits toward the TOP-right next to the resources panel. Screen fraction.
	// With big crews the row grows - pull x more negative if it touches the staging stack.
	movePortraits = true
	portraitsOffset = -0.14,0.85
	portraitsScale = 0.85

	// Small G-force readout pinned left of the kerbal heads (KSP2 style).
	showGForce = true
	gforcePos = -0.38,0.84

	// CommNet signal widget sits INLINE with the breadcrumb bar (right of the location
	// text) like KSP2. Set commsInBar = false to use the plain commsOffset mover instead.
	moveComms = true
	commsInBar = true
	commsOffset = 0.005,-0.045

	// Keep the warp chevron panel pinned open (stock hides it at 1x / on mouse-leave).
	expandWarpPanel = true

	// Hide the pitch/roll/yaw trim bars (KSP2 has none). false to keep them.
	hideTrimGauges = true

	// Altimeter offset from its stock top-center spot; 0,0 = leave alone.
	altimeterOffset = 0,0

	// ---------- FLIGHT: new KSP2 widgets ----------

	// Top-left location breadcrumb: "Kerbol \ Kerbin \ Vessel Name".
	showBreadcrumb = true
	breadcrumbPos = 0,0

	// Left-edge VESSEL ACTIONS rail (gear/lights/brakes/solar/radiators/abort).
	showActionsRail = true
	railPos = 8,-44

	// Bottom-right green GO button (next stage + total dV readout).
	showGoButton = true
	goPos = -14,14

	// Pause + warp-to-sunrise buttons pinned just LEFT of the visible warp/MET box.
	// x = px gap from the box's left edge (more negative = further left), y = vertical nudge.
	showTimeButtons = true
	timeButtonsPos = -8,0

	// How far pause/dawn straddle from the box's vertical center, as a fraction of the
	// box's LIVE height (0.25 = each button centered in its own half - pause on the
	// WARP row, dawn on the MET row). Measured every frame now, and the button panel's
	// height is matched to the box's so their edges line up exactly.
	timeButtonRowSplit = 0.25

	// Hide the stock "next alarm" clock icon that appears beside MET when an alarm is
	// scheduled - not part of the KSP2 look. false to keep it.
	hideAlarmClock = true

	// Hide the stock warp-to-next-morning sun button on the warp/MET box - redundant
	// with the mod's own dawn button. false to keep it.
	hideWarpToMorning = true

	// Keep the stock resources panel open on entry (close it manually any time).
	showResources = true

	// Recolor the flight staging cards toward KSP2: dark slate backplate + green dV.
	paintStaging = true
	stageCardColor = 24,46,96
	stageDvColor = 0,227,82

	// ---------- EDITOR (VAB/SPH) ----------

	// Big green KSP2-style LAUNCH button (with total dV), bottom-right.
	moveLaunchButton = true
	launchButtonPos = 558,40

	// The stock launch-site selector (pick a site by clicking it directly, KSP2-style)
	// pinned permanently open ABOVE the LAUNCH button, instead of a popup at click time.
	expandLaunchSiteSelector = true
	launchSiteSelectorGap = 10

	// Shift the top-row New/Open/Save/Exit AND Steam workshop buttons right to close
	// the hidden stock-launch-button gap. (Takes effect on editor entry.)
	fillTopRow = true

	// Hide the stock total-dV readout at the bottom of the staging stack; the total
	// is shown on the GO (flight) and LAUNCH (editor) buttons instead.
	nukeStagingTotal = true

	// OFF: moving the tool strip dragged the whole build menu on this install.
	// If you want to try again it now targets only the small gizmo strip.
	moveEditorTools = false
	editorToolsPos = 0.5,0.955

	// ---------- FONT ----------

	// JetBrains Mono - the real KSP2 font (installed per-user by this mod).
	swapFont = true
	fontName = JetBrains Mono Medium
	// STEADY-STATE cadence for re-sweeping late-created text. The code sweeps FAST
	// (0.4s) for the first ~8s after a scene loads to catch UI still being built, then
	// settles to max(this, 5s) - the 5s floor keeps the periodic sweep cost far below
	// hitch territory (PAWs still get an instant targeted sweep, so slow is fine).
	fontSweepInterval = 1.5

	// Main menu/settings keep the stock font (mono overlaps their fixed layout).
	swapFontInMenus = false

	// JetBrains Mono is wider than stock - shrink swapped text so it fits.
	// 0.8 read too small; bumped 0.9 -> 0.95 for slightly bigger text (1.0 = full stock
	// size, may overflow some dialogs). Live-tunable: edit + Ctrl+Alt+F6.
	fontSizeMult = 0.95

	// Editor part-size badges ("1.25m", "2.5m"...) read tiny in stock KSP - boost
	// them instead of applying the shrink above. 1.0 = leave at stock size.
	sizeTagFontMult = 1.3

	// The altimeter's ATMOSPHERE caption gets this multiplier (word wrap is also
	// disabled for it so the final E can never drop to a second row). Only matters if
	// hideAtmosphere = false below.
	atmoLabelMult = 0.68

	// Remove the "ATMOSPHERE" word entirely (hide its GameObject). false = keep it.
	hideAtmosphere = true

	// Show the hotkey hint message when entering flight.
	showHints = true

	// ---------- DEBUG ----------

	// Ctrl+Alt+F6 reloads this file live. Ctrl+Alt+F8 dumps the UI tree to KSP.log
	// [ZKSP2DUMP]. (F10/F11 are stock-bound to thermal overlays - avoided.)
	reloadKey = F6
	dumpKey = F8
	dumpRequiresModifier = true
}
