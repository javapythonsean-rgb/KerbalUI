// Kerbal UI - a blue retheme derived from ZTheme (GPLv3, by zapSNH).
// All texture folders load at ZTheme's priority +20 so this pack overrides ZTheme
// without touching it. Delete GameData/KerbalUI to revert to plain ZTheme.

HUDReplacer:NEEDS[HUDReplacer]
{
	filePath = GameData/KerbalUI/PluginData/UI/
	priority = 22
}
HUDReplacer:NEEDS[HUDReplacer]
{
	filePath = GameData/KerbalUI/PluginData/VAB/
	priority = 24
}
HUDReplacer:NEEDS[HUDReplacer]
{
	filePath = GameData/KerbalUI/PluginData/KSC/
	priority = 23
}
HUDReplacer:NEEDS[HUDReplacer]
{
	filePath = GameData/KerbalUI/PluginData/flight/
	priority = 25
}
HUDReplacer:NEEDS[HUDReplacer]
{
	filePath = GameData/KerbalUI/PluginData/mods/
	priority = 30
}
HUDReplacer:NEEDS[HUDReplacer]
{
	filePath = GameData/KerbalUI/PluginData/KAL/
	priority = 26
}
HUDReplacer:NEEDS[HUDReplacer]
{
	filePath = GameData/KerbalUI/PluginData/mods/planetpacks/stock/
	priority = 30
}
HUDReplacer:NEEDS[HUDReplacer,GPP]
{
	filePath = GameData/KerbalUI/PluginData/mods/planetpacks/gpp/
	priority = 31
}
HUDReplacer:NEEDS[HUDReplacer,KcalbelohSystem]
{
	filePath = GameData/KerbalUI/PluginData/mods/planetpacks/kcalbeloh/
